<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夜空許願池 | 緊湊優化版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030509;
            --main-card-bg: rgba(13, 17, 23, 0.85);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --pass: #2ea043;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* --- 1. 加載與彈窗 --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s;
        }
        .spinner { width: 35px; height: 35px; border: 3px solid var(--glass); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #success-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; 
            justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px);
        }
        .glass-alert {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 25px; border-radius: 15px;
            text-align: center; width: 80%; max-width: 300px;
        }

        /* --- 2. 核心佈局 --- */
        .wrapper { 
            display: flex; 
            gap: 12px; 
            width: 96%; 
            max-width: 1200px; 
            height: 90vh; 
        }

        .display-section, .form-section {
            background: var(--main-card-bg); backdrop-filter: blur(15px);
            border-radius: 16px; border: 1px solid var(--border); 
            padding: 15px; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        .display-section { flex: 1.4; order: 1; }
        .form-section { flex: 0.6; order: 2; }

        @media (max-width: 768px) {
            body { overflow: auto; align-items: flex-start; padding: 10px 0; }
            .wrapper { flex-direction: column; height: auto; gap: 10px; }
            .display-section, .form-section { width: 100%; height: auto; min-height: 350px; }
            .form-section { order: 1; }
            .display-section { order: 2; height: 500px; }
        }

        /* --- 3. 留言卡片 --- */
        #wish-stream { 
            flex: 1; display: flex; flex-direction: column; 
            gap: 8px; 
            overflow-y: auto; padding-right: 5px;
        }
        #wish-stream::-webkit-scrollbar { width: 4px; }
        #wish-stream::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .wish-card { 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.04); 
            border-left: 3px solid var(--pass); border-radius: 10px; 
            font-size: 14px; flex-shrink: 0; line-height: 1.5;
        }

        .reply-box {
            margin-top: 8px; padding: 8px 10px; 
            background: rgba(255,255,255,0.06); 
            border-radius: 8px; border-left: 2px solid var(--accent); 
            font-size: 13px;
        }

        /* --- 4. 表單元件 --- */
        .custom-dropdown { position: relative; margin-bottom: 10px; }
        .dropdown-selected {
            padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.5); cursor: pointer; display: flex; justify-content: space-between; font-size: 14px;
        }
        .dropdown-options {
            display: none; position: absolute; top: 110%; width: 100%;
            background: #1c2128; border: 1px solid var(--border); border-radius: 8px; z-index: 100;
        }
        .dropdown-options.active { display: block; }
        .dropdown-option { padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; }

        textarea {
            width: 100%; height: 100px; padding: 10px; border-radius: 8px;
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--border);
            margin-bottom: 10px; resize: none; font-family: inherit; font-size: 15px;
        }

        button#sendBtn {
            padding: 12px; background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button#sendBtn:active { background: var(--accent); color: #000; }

        /* --- 5. 版權資訊 (僅新增此區塊樣式) --- */
        .footer { 
            margin-top: auto; 
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px; 
            color: var(--text-secondary); 
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="spinner"></div><p style="color:var(--accent); font-size: 14px; margin-top: 10px;">同步星空中...</p></div>

    <div id="success-modal">
        <div class="glass-alert">
            <h3 style="color: #fff; margin: 0 0 10px 0;">✨ 投遞成功</h3>
            <p style="color: var(--text-secondary); font-size: 13px;">審核通過後會即時顯示在左側！</p>
            <button onclick="closeModal()" style="width:100%; padding: 8px; border-radius: 8px; background: var(--accent); border:none; color:#000; font-weight:bold; cursor:pointer;">確定</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="display-section">
            <h3 style="margin: 0 0 12px 0; color: var(--accent); font-size: 1.2rem;">🌠 許願公佈欄</h3>
            <div id="wish-stream">載入中...</div>
        </div>

        <div class="form-section">
            <h3 style="text-align: center; margin: 0 0 12px 0; font-size: 1.2rem;">匿名投稿</h3>
            <div class="custom-dropdown">
                <div class="dropdown-selected" id="selected">🌠 匿名許願</div>
                <div class="dropdown-options" id="options">
                    <div class="dropdown-option" data-val="匿名許願">🌠 匿名許願</div>
                    <div class="dropdown-option" data-val="功能建議">💡 功能建議</div>
                    <div class="dropdown-option" data-val="系統回報">🚫 系統回報</div>
                </div>
                <input type="hidden" id="catVal" value="匿名許願">
            </div>
            <textarea id="msg" placeholder="請輸入你想說的話..."></textarea>
            <button id="sendBtn" onclick="send()">投遞願望</button>

            <div class="footer">
                &copy; 2026 -Anonymous-Wish-Pool-<br>
                由 陳芃均 進行維護
            </div>
        </div>
    </div>

    <script>
        const api = "https://script.google.com/macros/s/AKfycbwt1NghmTOfie8O_EZAT_XknAXPWruO5a1ldf5LGqEih0vGlQprtBqvtzvh2Gdo5xk0/exec"; 

        const sel = document.getElementById('selected');
        const opts = document.getElementById('options');
        sel.onclick = (e) => { e.stopPropagation(); opts.classList.toggle('active'); };
        document.querySelectorAll('.dropdown-option').forEach(o => {
            o.onclick = () => {
                sel.innerText = o.innerText;
                document.getElementById('catVal').value = o.dataset.val;
                opts.classList.remove('active');
            }
        });
        document.onclick = () => opts.classList.remove('active');

        window.onload = async () => {
            await loadWishes();
            const loader = document.getElementById('loader-wrapper');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        };

        async function loadWishes() {
            const stream = document.getElementById('wish-stream');
            try {
                const res = await fetch(api + "?t=" + new Date().getTime());
                let data = await res.json();
                stream.innerHTML = "";
                if (data.length === 0) {
                    stream.innerHTML = "<p style='color:var(--text-secondary); text-align:center; font-size: 13px;'>暫無審核通過的留言</p>";
                    return;
                }
                data.reverse();
                data.forEach(w => {
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    let html = `<b style="color:var(--accent)">${w.category}</b>：${w.content}`;
                    if (w.reply && w.reply.trim() !== "") {
                        html += `
                            <div class="reply-box">
                                <span style="color: var(--accent); font-weight: bold;">💬 管理員回應：</span><br>
                                <span style="color: #ddd;">${w.reply}</span>
                            </div>
                        `;
                    }
                    card.innerHTML = html;
                    stream.appendChild(card);
                });
            } catch (e) { stream.innerHTML = "讀取資料失敗"; }
        }

        async function send() {
            const btn = document.getElementById('sendBtn');
            const msg = document.getElementById('msg').value;
            if(!msg.trim()) return alert("內容不能為空");
            btn.disabled = true;
            btn.innerText = "投遞中...";
            try {
                await fetch(api, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                    category: document.getElementById('catVal').value, 
                    content: msg 
                })});
                document.getElementById('success-modal').style.display = 'flex';
                document.getElementById('msg').value = "";
            } catch (e) { alert("發送失敗"); }
            btn.disabled = false;
            btn.innerText = "投遞願望";
        }
        function closeModal() { document.getElementById('success-modal').style.display = 'none'; }
    </script>
</body>
</html>

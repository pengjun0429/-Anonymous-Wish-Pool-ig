<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名許願池 | 意見調查系統</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --accent: #00d2ff;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent);
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }
        select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e242e;
            color: white;
            box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; }
        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }
        /* 簡單的背景裝飾 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>🌠 匿名許願池</h1>
        <select id="category">
            <option value="匿名許願">匿名許願</option>
            <option value="功能建議">功能建議</option>
            <option value="系統回報">系統回報</option>
            <option value="其他心情">其他心情</option>
        </select>
        <textarea id="content" placeholder="在這裡寫下想法..."></textarea>
        <button id="submitBtn" onclick="sendData()">投遞願望</button>
    </div>

    <script>
        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value;
            
            // 替換為使用者的 GAS 網址
            const api = "https://script.google.com/macros/s/AKfycbxNleKd_QY-8hugMhmEy8BcxjRbx78DqcMqVVSvK3WdEeEq9HQMu7v-nduYc3mGFUvl/exec";

            if (!content.trim()) {
                alert("內容不能為空喔！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "傳送中...";

            try {
                await fetch(api, {
                    method: 'POST',
                    mode: 'no-cors', // GAS 跨網域處理
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, content })
                });

                alert("願望已傳送到星空（狀態：待處理）！");
                document.getElementById('content').value = "";
            } catch (error) {
                alert("傳送失敗，請稍後再試。");
            } finally {
                btn.disabled = false;
                btn.innerText = "投遞願望";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜空許願池 | 高級毛玻璃介面</title>
    <style>
        :root {
            --bg: #030509;
            --main-card-bg: rgba(13, 17, 23, 0.7);
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --pass: #2ea043;
            --text: #f0f6fc;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- 1. 全螢幕初始化加載頁面 --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid var(--glass);
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 2. 成功提示毛玻璃彈窗 --- */
        #success-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .glass-alert {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); /* 強力毛玻璃 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 24px;
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transform: scale(0.8); animation: popIn 0.3s forwards;
            max-width: 300px;
        }
        @keyframes popIn { to { transform: scale(1); } }

        /* --- 3. 主介面佈局 --- */
        .wrapper {
            display: flex; gap: 2rem; width: 90%; max-width: 1000px; height: 500px;
        }
        .display-section, .form-section {
            background: var(--main-card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 25px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .display-section { flex: 1.2; }
        .form-section { flex: 0.8; }

        #wish-stream { flex: 1; display: flex; flex-direction: column-reverse; gap: 10px; justify-content: flex-end; }
        .wish-card { padding: 12px; background: rgba(46, 160, 67, 0.1); border-left: 3px solid var(--pass); border-radius: 8px; font-size: 14px; }

        select, textarea {
            width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px;
            background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            padding: 15px; background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--accent); letter-spacing: 2px;">連結星空中...</p>
    </div>

    <div id="success-modal">
        <div class="glass-alert">
            <div style="font-size: 50px; margin-bottom: 20px;">✨</div>
            <h2 style="margin: 0; color: #fff;">投遞成功</h2>
            <p style="color: rgba(255,255,255,0.7);">管理員審核後將會顯示在面板上</p>
            <button onclick="closeModal()" style="width: auto; padding: 10px 30px; margin-top: 10px;">確定</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="display-section">
            <h2 style="color: var(--accent);">🌠 許願公佈欄</h2>
            <div id="wish-stream"></div>
        </div>

        <div class="form-section">
            <h2 style="text-align: center;">匿名投稿</h2>
            <select id="cat">
                <option value="匿名許願">🌠 匿名許願</option>
                <option value="功能建議">💡 功能建議</option>
            </select>
            <textarea id="msg" placeholder="寫下你的願望..."></textarea>
            <button id="sendBtn" onclick="send()">投遞願望</button>
        </div>
    </div>

    <script>
        const api = "https://script.google.com/macros/s/AKfycbyEL1V1gljJ7sUtAjIjqjalaUp8KOm_nlO1MM3HQIbD5UDmnff0RbPcvINWhD5WfNAp/exec";

        window.onload = async () => {
            await loadWishes();
            // 讀取完畢後隱藏加載畫面
            const loader = document.getElementById('loader-wrapper');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        };

        async function loadWishes() {
            const stream = document.getElementById('wish-stream');
            try {
                const res = await fetch(api);
                const data = await res.json();
                stream.innerHTML = "";
                data.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<small style="color:var(--accent)">${wish.category}</small><br>${wish.content}`;
                    stream.appendChild(card);
                });
            } catch (e) { stream.innerHTML = "星空暫時斷開連線"; }
        }

        async function send() {
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('msg').value;
            if (!content.trim()) return alert("請輸入內容");

            btn.disabled = true;
            try {
                await fetch(api, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ category: document.getElementById('cat').value, content }) });
                showModal();
                document.getElementById('msg').value = "";
            } catch (e) { alert("發送失敗"); }
            btn.disabled = false;
        }

        function showModal() { document.getElementById('success-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('success-modal').style.display = 'none'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名許願池</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00f2fe; --pass: #2ea043; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid #30363d; width: 90%; max-width: 400px; }
        #display-panel { height: 200px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 20px; padding: 10px; overflow: hidden; display: flex; flex-direction: column-reverse; gap: 10px; }
        .wish-card { padding: 10px; background: var(--pass); border-radius: 6px; font-size: 14px; animation: fadeIn 0.5s ease; flex-shrink: 0; border-left: 4px solid var(--accent); }
        select, textarea { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--pass); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">🌠 許願公佈欄</h1>
        <div id="display-panel"><div style="margin:auto">載入中...</div></div>
        <select id="cat">
            <option value="匿名許願">🌠 匿名許願</option>
            <option value="功能建議">💡 功能建議</option>
            <option value="系統回報">🚫 系統回報</option>
        </select>
        <textarea id="msg" placeholder="輸入你想說的話..."></textarea>
        <button id="sendBtn" onclick="send()">投遞願望</button>
    </div>

    <script>
        const api = "https://script.google.com/macros/s/AKfycbyEL1V1gljJ7sUtAjIjqjalaUp8KOm_nlO1MM3HQIbD5UDmnff0RbPcvINWhD5WfNAp/exec";

        window.onload = loadWishes;

        async function loadWishes() {
            const panel = document.getElementById('display-panel');
            try {
                const res = await fetch(api);
                const data = await res.json();
                panel.innerHTML = data.length > 0 ? "" : "<div style='margin:auto'>尚無通過審核的願望</div>";
                data.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<strong>${wish.category}</strong>: ${wish.content}`;
                    panel.appendChild(card);
                });
            } catch (e) { panel.innerHTML = "連線失敗"; }
        }

        async function send() {
            const btn = document.getElementById('sendBtn');
            const payload = { category: document.getElementById('cat').value, content: document.getElementById('msg').value };
            if (!payload.content.trim()) return alert("內容不能為空");
            btn.disabled = true;
            await fetch(api, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("已送出！待審核通過後會顯示在面板。");
            document.getElementById('msg').value = "";
            btn.disabled = false;
        }
    </script>
</body>
</html>

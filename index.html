<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜空許願池 | 修復版自定義選單</title>
    <style>
        :root {
            --bg: #030509;
            --main-card-bg: rgba(13, 17, 23, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.3);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
        }

        body {
            background-color: var(--bg);
            /* 星空背景 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 1.5px, transparent 1.5px),
                radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 150px 150px, 100px 100px;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        .wrapper {
            display: flex; gap: 2rem; width: 90%; max-width: 1000px; height: 520px;
        }

        /* 左右分欄區塊（與參考圖一致） */
        .display-section, .form-section {
            background: var(--main-card-bg);
            backdrop-filter: blur(10px); /* 毛玻璃 */
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 25px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .display-section { flex: 1.2; }
        .form-section { flex: 0.8; }

        /* 面板顯示樣式 */
        #wish-stream { flex: 1; display: flex; flex-direction: column-reverse; gap: 10px; justify-content: flex-end; }
        .wish-card { padding: 12px; background: rgba(46, 160, 67, 0.1); border-left: 3px solid #2ea043; border-radius: 8px; font-size: 14px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* 分割線 */
        .divider { border: 0; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }

        /* --- 自定義圖文選單樣式 (修復破圖核心) --- */
        .custom-dropdown {
            position: relative; width: 100%; margin-bottom: 1.2rem;
        }
        .dropdown-selected {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.3); color: #fff; cursor: pointer; transition: 0.2s;
        }
        .dropdown-selected:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .dropdown-selected::after { content: '▼'; font-size: 12px; color: var(--text-secondary); }

        /* 下拉選項清單 */
        .dropdown-options {
            display: none; position: absolute; top: calc(100% + 5px); left: 0;
            width: 100%; background: #0b0e14; border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .dropdown-options.active { display: block; animation: slideIn 0.2s ease-out; }
        .dropdown-option {
            display: flex; align-items: center; padding: 14px; cursor: pointer; color: #fff; transition: background 0.2s;
        }
        .dropdown-option:hover { background: rgba(255,255,255,0.05); }
        .dropdown-option strong { margin-left: 10px; font-size: 15px; }

        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } }

        /* --- 輸入框與按鈕 --- */
        textarea {
            width: 100%; padding: 14px; margin-bottom: 1.5rem; border-radius: 10px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3);
            color: #fff; font-size: 16px; box-sizing: border-box; resize: none; height: 120px;
        }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        button {
            padding: 16px; background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 10px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; margin-top: auto;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="display-section">
            <h2 style="color: #fff; text-shadow: 0 0 10px var(--accent);">🌠 許願公佈欄 (已通過)</h2>
            <div class="divider"></div>
            <div id="wish-stream">載入星空中...</div>
        </div>

        <div class="form-section">
            <h1 style="text-align: center; color: #fff; margin-top:0;">匿名投稿</h1>
            <div class="divider"></div>

            <label>選擇分類 (點擊展開)</label>
            <div class="custom-dropdown">
                <div class="dropdown-selected" id="dropdownSelected">
                    <span>🌠 匿名許願</span>
                </div>
                <div class="dropdown-options" id="dropdownOptions">
                    <div class="dropdown-option" data-value="匿名許願">
                        🌠 <strong>匿名許願</strong>
                    </div>
                    <div class="dropdown-option" data-value="功能建議">
                        💡 <strong>功能建議</strong>
                    </div>
                    <div class="dropdown-option" data-value="系統回報">
                        🚫 <strong>系統回報</strong>
                    </div>
                </div>
                <input type="hidden" id="categoryVal" value="匿名許願">
            </div>

            <label>傳達你的想法</label>
            <textarea id="msg" placeholder="寫下留言內容..."></textarea>
            
            <button id="sendBtn" onclick="send()">投遞願望</button>
        </div>
    </div>

    <script>
        const api = "https://script.google.com/macros/s/AKfycbyEL1V1gljJ7sUtAjIjqjalaUp8KOm_nlO1MM3HQIbD5UDmnff0RbPcvINWhD5WfNAp/exec";

        // --- 1. 自定義下拉選單邏輯 (核心修正) ---
        const dropdown = document.querySelector('.custom-dropdown');
        const selected = document.getElementById('dropdownSelected');
        const optionsContainer = document.getElementById('dropdownOptions');
        const hiddenInput = document.getElementById('categoryVal');

        // 切換開關
        selected.addEventListener('click', (e) => {
            e.stopPropagation(); // 防止冒泡
            optionsContainer.classList.toggle('active');
        });

        // 選擇選項
        document.querySelectorAll('.dropdown-option').forEach(option => {
            option.addEventListener('click', function() {
                const value = this.getAttribute('data-value');
                const html = this.innerHTML; // 抓取圖文 HTML

                hiddenInput.value = value; // 儲存真實值
                selected.querySelector('span').innerHTML = html; // 更新顯示外觀 (保持圖文排版)
                optionsContainer.classList.remove('active'); // 關閉下拉
            });
        });

        // 點擊外部關閉
        document.addEventListener('click', () => optionsContainer.classList.remove('active'));

        // --- 2. 原有功能邏輯維持 ---
        window.onload = loadWishes;
        async function loadWishes() {
            const stream = document.getElementById('wish-stream');
            try {
                const res = await fetch(api);
                const data = await res.json();
                stream.innerHTML = "";
                data.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = 'wish-card';
                    card.innerHTML = `<span style="color:var(--accent); font-weight:bold">${wish.category}</span>: ${wish.content}`;
                    stream.appendChild(card);
                });
            } catch (e) { stream.innerHTML = "連線失敗"; }
        }

        async function send() {
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('msg').value;
            if (!content.trim()) return alert("內容不能為空喔");
            btn.disabled = true;
            await fetch(api, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ category: hiddenInput.value, content }) });
            alert("已送出！審核通過後會顯示在旁邊。");
            document.getElementById('msg').value = "";
            btn.disabled = false;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夜空許願池 | IG 整合管理版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030509;
            --main-card-bg: rgba(13, 17, 23, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --report-red: #ff4d4d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* 在線指示燈 */
        .online-indicator {
            position: fixed; bottom: 20px; right: 20px;
            background-color: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 50px; display: flex; align-items: center;
            font-size: 13px; z-index: 9999; border: 1px solid var(--border);
        }
        .blink-dot {
            height: 8px; width: 8px; background-color: #2ecc71; border-radius: 50%;
            margin-right: 10px; position: relative;
        }
        .blink-dot::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-color: #2ecc71; border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }

        /* 佈局 */
        .wrapper { display: flex; flex-direction: column; gap: 15px; width: 92%; max-width: 450px; padding: 20px 0; }
        .section {
            background: var(--main-card-bg); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border); padding: 20px;
        }

        #wish-stream { max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .wish-card { padding: 12px; background: rgba(255,255,255,0.04); border-left: 3px solid var(--accent); border-radius: 10px; font-size: 14px; text-align: left; }
        .admin-reply { margin-top: 8px; padding: 8px; background: rgba(0, 242, 254, 0.1); border-radius: 8px; font-size: 13px; color: var(--accent); }

        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 12px;
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--border); margin-bottom: 15px; resize: none; outline: none;
        }
        button { cursor: pointer; transition: 0.3s; font-weight: bold; }
        #sendBtn { width: 100%; padding: 14px; background: transparent; color: var(--accent); border: 2px solid var(--accent); border-radius: 12px; }
        #reportBtn { width: 100%; padding: 12px; background: transparent; color: var(--report-red); border: 2px solid var(--report-red); border-radius: 12px; margin-top: 10px; }

        /* 彈窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(12px);
        }
        .glass-alert {
            background: rgba(25, 25, 35, 0.85); border: 1px solid var(--border); padding: 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px;
        }

        .footer { margin-top: 20px; font-size: 11px; color: var(--text-secondary); text-align: center; }
        .admin-item { border-bottom: 1px solid #333; padding: 10px 0; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

    <div class="online-indicator"><span class="blink-dot"></span><span class="status-text">網站在線中</span></div>

    <div id="success-modal" class="modal-overlay">
        <div class="glass-alert"><h3>✨ 投遞成功</h3><p style="color:var(--text-secondary)">等待管理員審核後即可顯示。</p><button onclick="closeModal('success-modal')" style="width:100%; padding:10px; border-radius:10px; border:none; margin-top:10px;">確定</button></div>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="glass-alert">
            <h3 style="color:var(--accent)">管理後台</h3>
            <div id="admin-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button onclick="closeModal('admin-modal')" style="width:100%; padding:10px; background:#333; color:#fff; border:none; border-radius:10px;">關閉</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="section">
            <h3 style="margin:0; color:var(--accent); text-align:center; letter-spacing:2px;">🌠 IG 版許願池</h3>
            <div id="wish-stream">載入中...</div>
        </div>

        <div class="section">
            <h3 style="text-align:center; margin:0 0 15px 0;">匿名投稿</h3>
            <textarea id="msg" placeholder="輸入願望..."></textarea>
            <button id="sendBtn" onclick="sendWish()">投遞願望</button>
            <button id="reportBtn" onclick="alert('回報功能目前整合於 GAS 中')">🚫 系統錯誤回報</button>

            <div class="footer">
                &copy; 2026 -Anonymous-Wish-Pool-ig<br>
                由 使用者 進行維護
            </div>
            <button onclick="checkAdmin()" style="background:none; border:none; color:#111; font-size:10px; margin-top:10px;">Admin</button>
        </div>
    </div>

    <script>
        const wishApi = "https://script.google.com/macros/s/AKfycbxs8HLpSL4oXX7IsMhdeb6wT90N1wqLhFvrwYeynA0f1efPHz2pm54jpDbeHj8EJ_zz/exec"; // 務必填入部署後的網址
        const ADMIN_PW = "1234"; // 預設管理密碼

        async function loadWishes() {
            const stream = document.getElementById('wish-stream');
            try {
                const res = await fetch(wishApi + "?t=" + Date.now());
                const data = await res.json();
                stream.innerHTML = "";
                const activeWishes = data.filter(w => w.status === "已通過").reverse();
                if (activeWishes.length === 0) { stream.innerHTML = "<p style='text-align:center; font-size:12px; color:#555;'>暫無留言</p>"; return; }
                activeWishes.forEach(w => {
                    const div = document.createElement('div');
                    div.className = 'wish-card';
                    div.innerHTML = `<b>投稿</b>：\${w.content}\${w.reply ? `<div class="admin-reply"><b>回覆</b>：\${w.reply}</div>` : ''}`;
                    stream.appendChild(div);
                });
            } catch (e) { stream.innerHTML = "載入失敗"; }
        }

        async function sendWish() {
            const msg = document.getElementById('msg').value;
            if(!msg.trim()) return;
            await fetch(wishApi, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ category: "匿名投稿", content: msg })});
            document.getElementById('msg').value = "";
            showModal('success-modal');
        }

        function checkAdmin() {
            if (prompt("管理員密碼:") === ADMIN_PW) showAdminPortal();
        }

        async function showAdminPortal() {
            showModal('admin-modal');
            const list = document.getElementById('admin-list');
            list.innerHTML = "載入中...";
            const res = await fetch(wishApi + "?t=" + Date.now());
            const data = await res.json();
            list.innerHTML = "";
            data.reverse().forEach(w => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.innerHTML = `
                    <div style="color:var(--accent)">[\${w.status}] ID: \${w.id}</div>
                    <div>\${w.content}</div>
                    <div style="margin-top:5px">
                        <button onclick="adminAction('reply', \${w.id})" style="background:#2ecc71; border:none; border-radius:4px; padding:2px 8px; font-size:11px;">回覆/通過</button>
                        <button onclick="adminAction('delete', \${w.id})" style="background:var(--report-red); border:none; border-radius:4px; padding:2px 8px; font-size:11px; color:#fff;">刪除</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function adminAction(type, id) {
            let payload = { action: "admin_action", type: type, rowId: id };
            if (type === 'reply') {
                const reply = prompt("回覆內容 (送出後狀態將變更為已通過):");
                if (reply === null) return;
                payload.replyText = reply;
            } else if (!confirm("確定刪除？")) return;

            await fetch(wishApi, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("操作成功");
            showAdminPortal();
            loadWishes();
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = loadWishes;
    </script>
</body>
</html>

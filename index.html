<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜空許願池 | 霓虹雙欄堆疊系統</title>
    <style>
        :root {
            --bg: #030509;
            --main-card-bg: rgba(13, 17, 23, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2fe;
            --accent-glow: #4facfe;
            --pass: #2ea043;
            --pass-glow: rgba(46, 160, 67, 0.3);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
        }

        body {
            background-color: var(--bg);
            /* 星空背景 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 雙欄主容器 */
        .wrapper {
            display: flex;
            gap: 2rem;
            width: 90%;
            max-width: 1100px; /* 增加最大寬度以容納雙欄 */
            height: 550px; /* 固定高度，與參考圖比例相近 */
            z-index: 10;
        }

        /* --- 左欄：留言顯示面板 (對應參考圖的圖面部分) --- */
        .display-section {
            flex: 1.2; /* 留言板稍微寬一點 */
            background: var(--main-card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 關鍵：超出隱藏 */
            position: relative;
        }

        .section-header {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 20px;
            text-align: left;
            letter-spacing: 1px;
        }

        #wish-stream {
            flex: 1;
            display: flex;
            flex-direction: column-reverse; /* 新的排在上面，舊的往上推 */
            gap: 12px;
            justify-content: flex-end; /* 內容靠底部堆疊 */
            overflow: hidden; /* 確保不顯示滾動條，達成堆疊直到放不下 */
        }

        .wish-card {
            padding: 12px 15px;
            background: rgba(46, 160, 67, 0.1);
            border-left: 3px solid var(--pass);
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            animation: wishFadeIn 0.5s ease-out;
            flex-shrink: 0; /* 防止卡片被壓縮 */
        }

        @keyframes wishFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 右欄：投稿表單 (留言放在旁邊) --- */
        .form-section {
            flex: 0.8; /* 表單窄一點 */
            background: var(--main-card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .divider {
            border: 0; height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-secondary); }
        
        select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.2s;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
        textarea { height: 160px; resize: none; }

        button {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto; /* 置底 */
        }
        button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 背景流星元件 */
        .shooting-star { position: absolute; background: linear-gradient(-45deg, white, rgba(255,255,255,0)); border-radius: 50%; animation: tail 3s ease-in-out infinite; }
        @keyframes tail { 0% { width: 0; transform: translate(0, 0); opacity: 0; } 10% { width: 100px; opacity: 1; } 100% { width: 0; transform: translate(-1000px, 1000px); opacity: 0; } }
        .shooting-star:nth-child(1) { top: -10%; right: 10%; height: 2px; animation-delay: 0.5s; }
        .shooting-star:nth-child(2) { top: -5%; right: 40%; height: 1px; animation-delay: 2s; }

    </style>
</head>
<body>
    <div class="shooting-star"></div><div class="shooting-star"></div>
    
    <div class="wrapper">
        <div class="display-section">
            <div class="section-header">🌠 許願公佈欄 (已通過)</div>
            <div class="divider"></div>
            <div id="wish-stream">
                <div style="margin: auto; color: var(--text-secondary);">連線至星空中...</div>
            </div>
        </div>

        <div class="form-section">
            <h1 style="text-align: center; color: #fff; text-shadow: 0 0 15px var(--accent); margin-top:0;">匿名投稿</h1>
            <div class="divider"></div>

            <label for="cat">選擇分類</label>
            <select id="cat">
                <option value="匿名許願">🌠 匿名許願</option>
                <option value="功能建議">💡 功能建議</option>
                <option value="系統回報">🚫 系統回報</option>
            </select>

            <label for="msg">傳達你的想法</label>
            <textarea id="msg" placeholder="在此寫下留言內容..."></textarea>
            
            <button id="sendBtn" onclick="send()">投遞願望</button>
        </div>
    </div>

    <script>
        // 替換為使用者的 GAS 網址 (務必是最新版本的 .exec)
        const api = "https://script.google.com/macros/s/AKfycbyEL1V1gljJ7sUtAjIjqjalaUp8KOm_nlO1MM3HQIbD5UDmnff0RbPcvINWhD5WfNAp/exec";

        window.onload = loadWishes;

        async function loadWishes() {
            const stream = document.getElementById('wish-stream');
            try {
                const res = await fetch(api);
                const data = await res.json();
                stream.innerHTML = ""; // 清空載入中

                if (data.length > 0) {
                    // data.reverse().forEach(...) 可改為由新到舊排
                    data.forEach(wish => {
                        const card = document.createElement('div');
                        card.className = 'wish-card';
                        card.innerHTML = `<span style="color:var(--accent); font-weight:bold; margin-right:8px;">${wish.category}</span>${wish.content}`;
                        stream.appendChild(card);
                    });
                } else {
                    stream.innerHTML = "<div style='margin:auto; color: var(--text-secondary);'>尚無審核通過的留言</div>";
                }
            } catch (e) { 
                stream.innerHTML = "<div style='margin:auto; color: #ff6b6b;'>連線失敗</div>"; 
            }
        }

        async function send() {
            const btn = document.getElementById('sendBtn');
            const category = document.getElementById('cat').value;
            const content = document.getElementById('msg').value;

            if (!content.trim()) return alert("留言內容不能為空喔！");

            btn.disabled = true;
            btn.innerText = "投遞中...";

            try {
                // 使用 POST 投稿
                await fetch(api, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ category, content }) });
                alert("願望已排入待處理清單！管理員審核後會公開顯示在旁邊。");
                document.getElementById('msg').value = "";
            } catch (e) { 
                alert("傳送失敗，請稍後再試。"); 
            }
            btn.disabled = false;
            btn.innerText = "投遞願望";
        }
    </script>
</body>
</html>
